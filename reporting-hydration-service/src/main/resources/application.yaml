# FIXME: post-processing config
service:
  fixed-delay:
    cached-ids: ${FIXED_DELAY_ID:20000}
    datamart: ${FIXED_DELAY_DM:60000}
    backfill: ${FIXED_DELAY_BF:600000}
  max-retries: ${MAX_RETRIES:3}

spring:
  application:
    name: reporting-hydration-service

  kafka:
    # FIXME: updated post-processing kafka config, merge with rest once https://github.com/CDCgov/NEDSS-DataReporting/pull/723 is merged
    topics:
      nbs:
        act-relationship: ${TOPIC_NBS_ACT_RELATIONSHIP:nbs_Act_relationship}
        auth-user: ${TOPIC_NBS_AUTH_USER:nbs_Auth_user}
        ct-contact: ${TOPIC_NBS_CT_CONTACT:nbs_CT_contact}
        datamart: ${TOPIC_NBS_DATAMART:nbs_Datamart}
        intervention: ${TOPIC_NBS_INTERVENTION:nbs_Intervention}
        interview: ${TOPIC_NBS_INTERVIEW:nbs_Interview}
        notification: ${TOPIC_NBS_NOTIFICATION:nbs_Notification}
        observation: ${TOPIC_NBS_OBSERVATION:nbs_Observation}
        organization: ${TOPIC_NBS_ORGANIZATION:nbs_Organization}
        person: ${TOPIC_NBS_PERSON:nbs_Person}
        place: ${TOPIC_NBS_PLACE:nbs_Place}
        public-health-case: ${TOPIC_NBS_PUBLIC_HEALTH_CASE:nbs_Public_health_case}
        state-defined-field-data: ${TOPIC_NBS_STATE_DEFINED_FIELD_DATA:nbs_state_defined_field_data}
        treatment: ${TOPIC_NBS_TREATMENT:nbs_Treatment}
      nrt:
        auth-user: ${TOPIC_NRT_AUTH_USER:nrt_auth_user}
        contact: ${TOPIC_NRT_CONTACT:nrt_contact}
        interview: ${TOPIC_NRT_INTERVIEW:nrt_interview}
        investigation: ${TOPIC_NRT_INVESTIGATION:nrt_investigation}
        investigation-case-management: ${TOPIC_NRT_INVESTIGATION_CASE_MANAGEMENT:nrt_investigation_case_management}
        investigation-notification: ${TOPIC_NRT_INVESTIGATION_NOTIFICATION:nrt_investigation_notification}
        ldf-data: ${TOPIC_NRT_LDF_DATA:nrt_ldf_data}
        observation: ${TOPIC_NRT_OBSERVATION:nrt_observation}
        odse-nbs-page: ${TOPIC_NRT_ODSE_NBS_PAGE:nrt_odse_NBS_page}
        odse-state-defined-field-metadata: ${TOPIC_NRT_ODSE_STATE_DEFINED_FIELD_METADATA:nrt_odse_state_defined_field_metadata}
        organization: ${TOPIC_NRT_ORGANIZATION:nrt_organization}
        patient: ${TOPIC_NRT_PATIENT:nrt_patient}
        place: ${TOPIC_NRT_PLACE:nrt_place}
        provider: ${TOPIC_NRT_PROVIDER:nrt_provider}
        srte-condition-code: ${TOPIC_NRT_CONDITION_CODE:nrt_srte_Condition_code}
        treatment: ${TOPIC_NRT_TREATMENT:nrt_treatment}
        vaccination: ${TOPIC_NRT_VACCINATION:nrt_vaccination}

    # FIXME: post-procssing kafka config
    dlt-group-id: rtr-dlt-group
    topic:
#      investigation: nrt_investigation
#      observation: nrt_observation
#      organization: nrt_organization
#      patient: nrt_patient
#      provider: nrt_provider
#      notification: nrt_investigation_notification
#      treatment: nrt_treatment
#      case_management: nrt_investigation_case_management
#      interview: nrt_interview
#      ldf_data: nrt_ldf_data
#      place: nrt_place
#      auth_user: nrt_auth_user
#      contact_record: nrt_contact
#      vaccination: nrt_vaccination
#      page: nrt_odse_NBS_page
#      datamart: nbs_Datamart
#      state_defined_field_metadata: nrt_odse_state_defined_field_metadata
#      condition: nrt_srte_Condition_code
    investigation-topic:
#      topic-name-phc: nbs_Public_health_case
#      topic-name-ntf: nbs_Notification
#      topic-name-int: nbs_Interview
#      topic-name-ctr: nbs_CT_contact
#      topic-name-vac: nbs_Intervention
#      topic-name-tmt: nbs_Treatment
#      topic-name-ar: nbs_Act_relationship
    ldf-topic:
#      topic-name: nbs_state_defined_field_data
    observation-topic:
#      topic-name: nbs_Observation
#      topic-name-ar: nbs_Act_relationship
    organization-topic:
#      topic-name: ${INPUT_TOPIC_ORGANIZATION:nbs_Organization}
#      topic-name-place: ${INPUT_TOPIC_PLACE:nbs_Place}
    person-topic:
#      topic-name: ${INPUT_TOPIC_PERSON:nbs_Person}
#      topic-name-user: ${INPUT_TOPIC_USER:nbs_Auth_user}

    # FIXME: put back to normal
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVER:localhost:9092}
    group-id: ${KAFKA_CONSUMER_APP:hydration-consumer-app}
    producer:
      value-serializer: org.springframework.kafka.support.serializer.StringOrBytesSerializer
      key-serializer: org.springframework.kafka.support.serializer.StringOrBytesSerializer
    input:
      # Investigation
      topic-name-phc: ${INPUT_TOPIC_PHC:nbs_Public_health_case}
      topic-name-ntf: ${INPUT_TOPIC_NTF:nbs_Notification}
      topic-name-int: ${INPUT_TOPIC_INT:nbs_Interview}
      topic-name-ctr: ${INPUT_TOPIC_CTR:nbs_CT_contact}
      topic-name-vac: ${INPUT_TOPIC_VAC:nbs_Intervention}
      topic-name-tmt: ${INPUT_TOPIC_TMT:nbs_Treatment}
      topic-name-ar: ${INPUT_TOPIC_AR:nbs_Act_relationship}

      # Ldf Data
      topic-name-sdfd: ${INPUT_TOPIC_SDFD:nbs_state_defined_field_data}

      # Person
      topic-name-person: ${INPUT_TOPIC_PERSON:nbs_Person}
      topic-name-user: ${INPUT_TOPIC_USER:nbs_Auth_user}

      # Organization
      topic-name-organization: ${INPUT_TOPIC_ORGANIZATION:nbs_Organization}
      topic-name-place: ${INPUT_TOPIC_PLACE:nbs_Place}

      # Observation
      topic-name-observation: ${INPUT_TOPIC_OBSERVATION:nbs_Observation}
    output:
      # Investigation
      topic-name-reporting: ${OUTPUT_TOPIC_REPORTING:nrt_investigation}
      topic-name-confirmation: ${OUTPUT_TOPIC_CONFIRMATION:nrt_investigation_confirmation}
      topic-name-observation: ${OUTPUT_TOPIC_OBSERVATION:nrt_investigation_observation}
      topic-name-notifications: ${OUTPUT_TOPIC_NOTIFICATIONS:nrt_investigation_notification}
      topic-name-page-case-answer: ${OUTPUT_TOPIC_PAGE_CASE_ANSWER:nrt_page_case_answer}
      topic-name-aggregate: ${OUTPUT_TOPIC_AGGREGATE:nrt_investigation_aggregate}
      topic-name-case-management: ${OUTPUT_TOPIC_CASE_MANAGEMENT:nrt_investigation_case_management}
      topic-name-interview: ${OUTPUT_TOPIC_INTERVIEW:nrt_interview}
      topic-name-interview-answer: ${OUTPUT_TOPIC_INTERVIEW_ANSWER:nrt_interview_answer}
      topic-name-interview-note: ${OUTPUT_TOPIC_INTERVIEW_NOTE:nrt_interview_note}
      topic-name-rdb-metadata-columns: ${OUTPUT_TOPIC_METADATA_COLUMNS:nrt_metadata_columns}
      topic-name-contact: ${OUTPUT_TOPIC_CONTACT:nrt_contact}
      topic-name-contact-answer: ${OUTPUT_TOPIC_CONTACT_ANSWER:nrt_contact_answer}
      topic-name-vaccination: ${OUTPUT_TOPIC_VACCINATION:nrt_vaccination}
      topic-name-vaccination-answer: ${OUTPUT_TOPIC_VACCINATION_ANSWER:nrt_vaccination_answer}
      topic-name-treatment: ${OUTPUT_TOPIC_TREATMENT:nrt_treatment}

      # Ldf Data
      topic-name-reporting-ldf-data: ${OUTPUT_TOPIC_REPORTING_LDF:nrt_ldf_data}

      # Person
      providerElastic:
        topic-name: ${PROVIDER_ELASTIC:elastic_search_provider}
      providerReporting:
        topic-name: ${PROVIDER_REPORTING:nrt_provider}
      patientElastic:
        topic-name: ${PATIENT_ELASTIC:elastic_search_patient}
      patientReporting:
        topic-name: ${PATIENT_REPORTING:nrt_patient}
      userReporting:
        topic-name: ${USER_REPORTING:nrt_auth_user}

      # Organization
      organizationElastic:
        topic-name: ${ORGANIZATION_ELASTIC:elastic_search_organization}
      organizationReporting:
        topic-name: ${ORGANIZATION_REPORTING:nrt_organization}
      placeReporting:
        topic-name: ${PLACE_REPORTING:nrt_place}
      placeTeleReporting:
        topic-name: ${PLACE_TELE_REPORTING:nrt_place_tele}

      # Observation
      observationReporting:
        topic-name: ${OUTPUT_TOPIC_OBS_REPORTING:nrt_observation}
      observationCoded:
        topic-name: ${OUTPUT_TOPIC_OBS_CODED:nrt_observation_coded}
      observationDate:
        topic-name: ${OUTPUT_TOPIC_OBS_DATE:nrt_observation_date}
      observationEdx:
        topic-name: ${OUTPUT_TOPIC_OBS_EDX:nrt_observation_edx}
      observationMaterial:
        topic-name: ${OUTPUT_TOPIC_OBS_MATERIAL:nrt_observation_material}
      observationNumeric:
        topic-name: ${OUTPUT_TOPIC_OBS_NUMERIC:nrt_observation_numeric}
      observationReason:
        topic-name: ${OUTPUT_TOPIC_OBS_REASON:nrt_observation_reason}
      observationTxt:
        topic-name: ${OUTPUT_TOPIC_OBS_TXT:nrt_observation_txt}
    dlq:
      retry-suffix: _retry
      dlq-suffix: _dlt

      # FIXME: post-processing kafka config
#      dlq-suffix-format-2: _dlt
    consumer:
      max-retry: 3
      maxPollIntervalMs: 30000
      maxPollRecs: ${KAFKA_CONSUMER_MAX_POLL_RECS:200}
      key-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    admin:
      auto-create: true

  datasource:
    password: reporting_hydration_service
    username: reporting_hydration_service_rdb
    url: jdbc:sqlserver://localhost:3433;databaseName=RDB_MODERN;encrypt=true;trustServerCertificate=true;

featureFlag:
  elastic-search-enable: ${FF_ES_ENABLE:false}
  phc-datamart-disable: ${FF_PHC_DM_DISABLE:false}
  thread-pool-size: ${FF_THREAD_POOL_SIZE:1}
  service-disable: ${FF_SERVICE_DISABLE:false}

management:
  endpoint:
    prometheus:
      access: read_only
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  prometheus:
    metrics:
      export:
        enabled: true

server:
  port: "8095"
