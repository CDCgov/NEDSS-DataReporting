# ODSE volume model. Every fan-out is configurable here.
#
# Per-patient means below are MEASURED from the Kentucky ODSE: 12,474,606 unique
# MPR patients, 3,241 GB total, profiled via scripts/odse_volume_profile.sql.
# Poisson takes the measured mean directly and gets total volume right
# (sum = mean * patients), which is the footprint target.
#
# distribution: "fixed" -> value; "uniform" -> [min,max]; "poisson" -> mean;
# "zipf" -> power law over [min,max] with zipf_param (skew toward min).

patients: 10000        # distinct real patients (MPR); raise toward millions for footprint
seed: 42

# --- Per-patient fan-out, measured from Kentucky ---
investigations_per_patient:   # KY: 2,646,466 PHC / 12.47M patients
  distribution: poisson
  mean: 0.21             # most patients have none; a fifth have one

person_records_per_patient:   # KY: 64.7M PAT person rows / 12.47M MPR
  distribution: poisson
  mean: 5.19

observations_per_patient:     # KY: 112.9M observation / 12.47M
  distribution: poisson
  mean: 9.05

obs_values_per_observation:   # KY: 221.6M value rows (txt+num+coded+date) / 112.9M obs
  distribution: poisson
  mean: 1.96

act_relationships_per_patient:  # KY: 79.4M / 12.47M
  distribution: poisson
  mean: 6.36

participations_per_patient:   # KY: 253.9M / 12.47M -- the largest fan-out
  distribution: poisson
  mean: 20.35

notifications_per_patient:    # KY: 2.33M / 12.47M
  distribution: poisson
  mean: 0.19

treatments_per_patient:       # KY: 134K / 12.47M -- rare
  distribution: poisson
  mean: 0.011

# --- Key allocation ---
# Reserve a range ABOVE the correctness fixtures (they occupy 20_000_000..22_099_999).
# Each patient owns a contiguous stride block so every child UID is DERIVED, with no
# cross-shard lookups and no collisions.
key_base: 100000000
key_stride_per_patient: 1000

# --- Sharding (bounds tablefaker's in-memory DataFrames) ---
patients_per_shard: 2000

# --- Load target ---
db:
  server: "localhost,3433"
  database: "NBS_ODSE"
  user: "sa"
  # password read from ODSE_DB_PASSWORD env (default PizzaIsGood33! for the local stack)
