services:
  mssql:
    image: ${DB_IMAGE:-ghcr.io/cdcent/nedssdb:latest}
    platform: linux/amd64
    ports:
      - 3433:1433
    environment:
      - DATABASE_VERSION=${DB_VERSION:-6.0.17.1}
      - DATABASE_PASSWORD=${DB_PASSWORD:-PizzaIsGood33!}
      - RUN_SEEDING=${RUN_SEEDING:-false}
    volumes:
      - ./containers/db/intiailize/restore.d:/docker-entrypoint-initdb.d
    networks:
      - rtr

  liquibase:
    build:
      dockerfile: ./liquibase-service/Dockerfile.local
    environment:
      - DB_USERNAME=sa
      - DB_PASSWORD=${DB_PASSWORD:-PizzaIsGood33!}
      - DB_HOST=${DB_HOST:-mssql}
      - DB_PORT=${DB_PORT:-1433}
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - rtr
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/migrations_complete"]
      interval: 5s
      timeout: 5s
      retries: 15

  wildfly:
    image: ${WILDFLY_IMAGE:-ghcr.io/cdcent/nedssdev:6.0.18.1}
    container_name: rtr-wildfly
    ports:
      - "9991:9990"
      - "7003:7001"
      - "8788:8787"
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - rtr

  kafka:
    image: confluentinc/cp-kafka:7.8.0
    hostname: kafka
    container_name: kafka
    depends_on:
      liquibase:
        condition: service_completed_successfully
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://kafka:9092,CONTROLLER://kafka:29093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      CLUSTER_ID: "RTRDevClusterId0000000"
    networks:
      - rtr

  kafka-connect:
    container_name: kafka-connect
    build:
      dockerfile: ./containers/kafka-connect/Dockerfile
    depends_on:
      kafka:
        condition: service_started
      mssql:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: "kafka:29092"
      GROUP_ID: "connect-cluster"
      CONFIG_STORAGE_TOPIC: "connect-configs"
      OFFSET_STORAGE_TOPIC: "connect-offsets"
      STATUS_STORAGE_TOPIC: "connect-status"
      CONFIG_STORAGE_REPLICATION_FACTOR: 1
      OFFSET_STORAGE_REPLICATION_FACTOR: 1
      STATUS_STORAGE_REPLICATION_FACTOR: 1
      KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      INTERNAL_KEY_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      INTERNAL_VALUE_CONVERTER: "org.apache.kafka.connect.json.JsonConverter"
      OFFSET_STORAGE_FILE_FILENAME: "/tmp/connect.offsets"
      OFFSET_FLUSH_INTERVAL_MS: 10000
      PLUGIN_PATH: "/kafka/connect"
      CONNECT_REST_ADVERTISED_HOST_NAME: "kafka-connect"
    networks:
      - rtr

  connector-setup:
    image: curlimages/curl:8.4.0
    container_name: connector-setup
    entrypoint: ["/bin/sh", "/kafka-connect/register-connectors.sh"]
    environment:
