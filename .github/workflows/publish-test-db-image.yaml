name: Publish Test Database Image

on:
  push:
    branches:
      - main
    paths:
      - 'containers/test-db/**'
      - 'containers/db/**'
      - 'liquibase-service/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  DATABASE_CONTAINER_NAME: "nedss-datareporting-nbs-mssql-1"
  LIQUIBASE_CONTAINER_NAME: "nedss-datareporting-liquibase-1"
  IMAGE_NAME: "nedss-datareporting-mssql"

jobs:
  build-and-push-test-db:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Create backups
        id: backups
        run: ./containers/test-db/create_bak_files.sh

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short git hash
        id: git_hash
        run: echo "GIT_HASH=$(git rev-parse --short=6 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Convert repository name to lowercase
        id: image_name
        run: |
          echo "name=${IMAGE_NAME,,}" >> "$GITHUB_OUTPUT"
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./containers/test-db/
          push: true
          platforms: linux/amd64
          build-args: |
            SQLCMDPASSWORD=${{ secrets.SQLCMDPASSWORD }}
            DATABASE_PASSWORD=${{ secrets.SQLCMDPASSWORD }}
          tags: |
            ${{ env.REGISTRY }}/cdcgov/${{ steps.image_name.outputs.name }}:latest
            ${{ env.REGISTRY }}/cdcgov/${{ steps.image_name.outputs.name }}:6.0.18.1
