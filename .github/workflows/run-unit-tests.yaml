name: Containerized Unit Tests
on:
  pull_request:
    paths:
      - "reporting-pipeline-service/**"
      - "liquibase-service/**"
      - "common-util/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - "docker-compose.yaml"
      - ".github/workflows/**"

jobs:
  pipeline:
    name: Run stored procedure unit tests
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    services:
      nbs-mssql:
        image: ghcr.io/cdcgov/nedss-datareporting-mssql:6.0.18.1
        ports:
          - 3433:1433

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: "zulu" # Alternative distribution options are available

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle

      - name: Run stored procedure tests
        working-directory: ./
        env:
          DB_URL_RDB: "jdbc:sqlserver://nbs-mssql:3433;databaseName=RDB_MODERN;encrypt=true;trustServerCertificate=true;loginTimeout=3;"
          DB_URL_ODSE: "jdbc:sqlserver://nbs-mssql:3433;databaseName=NBS_ODSE;encrypt=true;trustServerCertificate=true;loginTimeout=3;"
        run: |
          ./gradlew clean reporting-pipeline-service:test-unit --continue

      - name: Publish Testing Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: testing
          path: reporting-pipeline-service/build/reports
