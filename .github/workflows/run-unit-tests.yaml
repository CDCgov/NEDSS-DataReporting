name: Containerized Unit Tests
on:
  pull_request:
    paths:
      - "reporting-pipeline-service/**"
      - "liquibase-service/**"
      - "common-util/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - "docker-compose.yaml"
      - ".github/workflows/**"

jobs:
  pipeline:
    name: Run stored procedure unit tests
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: "zulu" # Alternative distribution options are available

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle

      - name: Start database
        run: |
          docker compose --file docker-compose.yaml --file docker-compose.test.yaml up --detach nbs-mssql

      - name: Wait for nbs-mssql to be healthy
        run: |
          CONTAINER_ID=$(docker ps -qf "label=com.docker.compose.service=nbs-mssql")
          TIMEOUT=60
          COUNT=0
          until [ "$(docker inspect -f '{{.State.Health.Status}}' "$CONTAINER_ID")" == "healthy" ]; do
            if [ $COUNT -ge $TIMEOUT ]; then
              echo "Timeout reached! nbs-mssql failed to become healthy."
              docker logs nbs-mssql
              exit 1
            fi
            echo "Waiting for nbs-mssql to be healthy... ($COUNT/$TIMEOUT)"
            sleep 2
            COUNT=$((COUNT + 2))
          done
          echo "nbs-mssql is healthy!"

      - name: Run stored procedure tests
        working-directory: ./
        run: |
          ./gradlew clean reporting-pipeline-service:test-unit --continue

      - name: Stop database
        if: always()
        run: |
          docker compose --file docker-compose.yaml --file docker-compose.test.yaml up down

      - name: Publish Testing Reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: testing
          path: reporting-pipeline-service/build/reports
