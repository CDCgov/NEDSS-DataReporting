spring:
  datasource:
    default:
      username: rtr_service_user
      password: rtr_service_user
      url: jdbc:sqlserver://localhost:3433;databaseName=RDB_MODERN;encrypt=true;trustServerCertificate=true;
    admin:
      username: rtr_admin
      password: rtr_admin
      url: jdbc:sqlserver://localhost:3433;databaseName=NBS_ODSE;encrypt=true;trustServerCertificate=true;
  jpa:
    show-sql: "true"
    hibernate:
      ddl-auto: none
  kafka:
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      key-serializer: org.springframework.kafka.support.serializer.StringOrBytesSerializer
    streams:
      application-id: reporting-pipeline-service
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVER:localhost:9092}
    consumer:
      key-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      maxPollIntervalMs: 3000
      metadata.max.age.ms: 6000

service:
  fixed-delay:
    cached-ids: 3000
    datamart: 3000
    backfill: 3000
  max-retries: 10
