spring:
  datasource:
    default:
      url: ${DB_URL_RDB:jdbc:sqlserver://localhost:3433;databaseName=RDB_MODERN;encrypt=true;trustServerCertificate=true;loginTimeout=3;}
      username: ${RTR_SERVICE_USER_NAME:rtr_service_user}
      password: ${RTR_SERVICE_USER_PASSWORD:rtr_service_user}
    admin:
      url: ${DB_URL_ODSE:jdbc:sqlserver://localhost:3433;databaseName=NBS_ODSE;encrypt=true;trustServerCertificate=true;loginTimeout=3;}
      username: ${DATABASE_USERNAME:sa}
      password: ${DATABASE_PASSWORD:PizzaIsGood33!}
  jpa:
    show-sql: "true"
    hibernate:
      ddl-auto: none
  kafka:
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    streams:
      application-id: reporting-pipeline-service
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVER:localhost:9092}
    consumer:
      maxPollIntervalMs: 3000
      metadata.max.age.ms: 6000
  liquibase:
    enabled: true
    user: ${RTR_SERVICE_USER_NAME:rtr_service_user}
    password: ${RTR_SERVICE_USER_PASSWORD:rtr_service_user}

connector:
  database:
    url: "jdbc:sqlserver://nbs-mssql:1433;databaseName=RDB_MODERN;encrypt=true;trustServerCertificate=true;loginTimeout=3"
    host: nbs-mssql
    port: "1433"
    username: ${RTR_SERVICE_USER_NAME:rtr_service_user}
    password: ${RTR_SERVICE_USER_PASSWORD:rtr_service_user}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVER:kafka:29092}
  debezium:
    enabled: true
    url: http://localhost:8085
  kafka-connect:
    enabled: true
    url: http://localhost:8083
