spring:
  datasource:
    default:
      username: ${RTR_SERVICE_USER_NAME:rtr_service_user}
      password: ${RTR_SERVICE_USER_PASSWORD:rtr_service_user}
      url: ${DB_HOST_RDB:jdbc:sqlserver://localhost:3433;databaseName=RDB_MODERN;encrypt=true;trustServerCertificate=true;}
    admin:
      username: ${RTR_ADMIN_NAME:rtr_admin}
      password: ${RTR_ADMIN_PASSWORD:rtr_admin}
      url: ${DB_HOST_ODSE:jdbc:sqlserver://localhost:3433;databaseName=NBS_ODSE;encrypt=true;trustServerCertificate=true;}
  jpa:
    show-sql: "true"
    hibernate:
      ddl-auto: none
  kafka:
    producer:
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      key-serializer: org.springframework.kafka.support.serializer.StringOrBytesSerializer
    streams:
      application-id: reporting-pipeline-service
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVER:localhost:9092}
    consumer:
      key-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      maxPollIntervalMs: 3000
      metadata.max.age.ms: 6000
