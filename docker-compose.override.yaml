# LOCAL fast-iteration override (auto-loaded by docker compose). Tightens the
# reporting-pipeline-service scheduling cadence so the CDC->nrt->SP drain completes
# in seconds instead of 20s/60s, for fast fixture iteration. Not for prod.
services:
  # APP-720: pin the DB to 6.0.19.1 (the committed compose default of 6.0.18.1 is
  # stale). Both the 7.12 baseline and 7.13 comparison runs must use 6.0.19.1 so
  # the legacy-RDB MasterETL baseline is identical across versions.
  nbs-mssql:
    environment:
      - DATABASE_VERSION=6.0.19.1
  reporting-pipeline-service:
    environment:
      - FIXED_DELAY_ID=2000
      - FIXED_DELAY_DM=3000
      - FIXED_DELAY_BF=600000
